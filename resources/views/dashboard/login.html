<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoDash — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a5fd8;--blue-dark:#1248b3;--blue-light:#e8f0fe;
  --green:#16a34a;--red:#dc2626;--red-light:#fee2e2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;
  --gray-700:#374151;--gray-900:#111827;
  --font:"Inter",sans-serif;
}
html,body{
  font-family:var(--font);height:100%;margin:0;
  background:var(--gray-50);
  display:flex;align-items:center;justify-content:center;min-height:100vh;
}

/* ── CARD ── */
.login-card{
  background:#fff;border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
  width:420px;max-width:95vw;overflow:hidden;
}

/* Bande tricolore */
.color-strip{
  height:4px;
  background:linear-gradient(90deg,var(--blue) 33%,var(--green) 33% 66%,var(--red) 66%);
}

.card-body{padding:40px 36px 32px}

/* Logo + titre */
.logo-section{text-align:center;margin-bottom:28px}
.logo-img{
  width:72px;height:72px;border-radius:14px;
  object-fit:contain;background:var(--gray-50);
  border:1px solid var(--gray-200);padding:8px;
  margin-bottom:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.app-name{font-size:22px;font-weight:800;color:var(--gray-900);letter-spacing:-.3px}
.app-brand{
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-top:3px;
}
.app-subtitle{font-size:12px;color:var(--gray-400);margin-top:5px}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.divider-line{flex:1;height:1px;background:var(--gray-200)}
.divider-text{font-size:12px;color:var(--gray-400);font-weight:500;white-space:nowrap}

/* Form */
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:7px}
.input-wrap{position:relative}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:15px;pointer-events:none}
.form-input{
  width:100%;padding:11px 14px 11px 40px;
  background:#fff;border:1.5px solid var(--gray-200);
  border-radius:10px;color:var(--gray-900);
  font-size:14px;font-family:var(--font);outline:none;
  transition:border .2s,box-shadow .2s;
}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,216,0.1)}
.form-input::placeholder{color:var(--gray-300)}
.eye-btn{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--gray-400);cursor:pointer;
  font-size:15px;padding:2px;transition:color .15s;
}
.eye-btn:hover{color:var(--gray-700)}

/* Btn */
.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--blue-dark),var(--blue));
  border:none;border-radius:10px;color:#fff;
  font-size:14px;font-weight:700;font-family:var(--font);
  cursor:pointer;transition:all .2s;letter-spacing:.2px;
  box-shadow:0 3px 12px rgba(26,95,216,0.3);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:hover{background:linear-gradient(135deg,#0f3d9e,var(--blue-dark));box-shadow:0 5px 18px rgba(26,95,216,0.4);transform:translateY(-1px)}
.btn-submit:active{transform:none}
.btn-submit:disabled{opacity:.6;cursor:default;transform:none}

.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.error-box{
  background:var(--red-light);border:1px solid #fca5a5;color:var(--red);
  padding:10px 14px;border-radius:9px;font-size:13px;
  margin-bottom:18px;display:none;align-items:center;gap:8px;font-weight:500;
}

/* Footer */
.card-footer{
  padding:14px 36px 20px;text-align:center;
  border-top:1px solid var(--gray-100);
}
.footer-text{font-size:11px;color:var(--gray-400)}
.api-status{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;font-size:11px;font-weight:500;color:var(--gray-400)}
.api-dot{width:7px;height:7px;border-radius:50%;background:var(--gray-300)}
.api-dot.online{background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,0.15)}
.api-dot.offline{background:var(--red)}
</style>
</head>

      <div class="app-name">EcoDash</div>
      <div class="app-brand">Empire TechNova</div>
      <div class="app-subtitle">Surveillance environnementale &amp; sociale</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Connexion à votre compte</span>
      <div class="divider-line"></div>
    </div>

    <div class="error-box" id="error-box">
      <span>⚠</span><span id="error-msg">Identifiants invalides.</span>
    </div>

    <div class="form-group">
      <label class="form-label">Adresse e-mail</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input class="form-input" type="email" id="email" placeholder="votre@email.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:22px">
      <label class="form-label">Mot de passe</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="eye-btn" type="button" onclick="togglePwd()">👁</button>
      </div>
    </div>

    <button class="btn-submit" id="login-btn" onclick="doLogin()">
      <span id="btn-text">Se connecter</span>
      <div class="spinner" id="spinner"></div>
    </button>

  </div>
  <div class="card-footer">
    <div class="footer-text">Accès réservé aux agents autorisés — Empire TechNova</div>
    <div class="api-status">
      <div class="api-dot" id="api-dot"></div>
      <span id="api-txt">Vérification connexion…</span>
    </div>
  </div>
</div>

<script>
// URL dynamique : même origine que la page (Railway, prod, local)
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:8000/api'
    : window.location.origin + '/api';

(function(){ if(localStorage.getItem("ecodash_token")) window.location.href="/dashboard"; })();

async function checkHealth(){
  const dot=document.getElementById("api-dot"),txt=document.getElementById("api-txt");
  try{
    const r=await fetch(API_BASE+"/health",{signal:AbortSignal.timeout(4000)});
    if(r.ok){dot.className="api-dot online";txt.textContent="Serveur connecté";}
    else throw 0;
  }catch{dot.className="api-dot offline";txt.textContent="Serveur non joignable";}
}

async function doLogin(){
  const email=document.getElementById("email").value.trim();
  const pwd=document.getElementById("password").value;
  const btn=document.getElementById("login-btn");
  const sp=document.getElementById("spinner");
  const bt=document.getElementById("btn-text");
  const eb=document.getElementById("error-box");
  if(!email||!pwd){showErr("Veuillez remplir tous les champs.");return;}
  btn.disabled=true;sp.style.display="block";bt.textContent="Connexion…";eb.style.display="none";
  try{
    const r=await fetch(API_BASE+"/auth/login",{
      method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({email,password:pwd})
    });
    const d=await r.json();
    if(!r.ok){showErr(d.message||(r.status===401?"Identifiants invalides.":"Erreur de connexion."));return;}
    localStorage.setItem("ecodash_token",d.token);
    localStorage.setItem("ecodash_user",JSON.stringify(d.user));
    bt.textContent="✓ Connecté !";
    setTimeout(()=>window.location.href="/dashboard",400);
  }catch{showErr("Impossible de joindre le serveur.");}
  finally{btn.disabled=false;sp.style.display="none";}
}

function showErr(m){
  document.getElementById("error-msg").textContent=m;
  document.getElementById("error-box").style.display="flex";
  document.getElementById("btn-text").textContent="Se connecter";
}
function togglePwd(){const i=document.getElementById("password");i.type=i.type==="password"?"text":"password";}
document.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
checkHealth();
</script>
